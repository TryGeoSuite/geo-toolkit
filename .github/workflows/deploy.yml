name: Deploy landing

# Auto-deploys the GeoSuite Open landing to Cloudflare Workers on every push to
# `main`. Manual runs via the Actions tab too.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token scoped "Edit Cloudflare Workers" from the
#                            GeoSuite Cloudflare account.
#   CLOUDFLARE_ACCOUNT_ID  — that account's id.

on:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'page.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    if: github.repository == 'TryGeoSuite/geo-toolkit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
